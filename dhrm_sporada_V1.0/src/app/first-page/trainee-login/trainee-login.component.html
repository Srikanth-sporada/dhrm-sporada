<!-- user login form -->
<form [formGroup]="traineeLoginForm" (ngSubmit)="submitForm()">
  <!--  mobile number -->
  <div class="flex-auto mb-3">
    <span class="font-bold block mb-2">Trainee ID</span>
    <input pInputText placeholder="Enter Trainee ID" class="w-full" formControlName="username"/>
  </div>
  <!-- password -->
  <div class="flex-auto mb-3">
    <span class="font-bold block mb-2">Password</span>
    <p-password  
    [toggleMask]="true" 
    [feedback]="false" 
    inputStyleClass="w-full" 
    styleClass="w-full"
    formControlName="pass"
    placeholder="Enter Your DDMMYYYY"> </p-password>
  </div>
  <!-- remember me -->
  <div class="flex items-center my-4 justify-between">
    <div class="flex items-center justify-center text-center gap-2">
      <p-checkbox inputId="remember-me" name="pizza" value="yes"></p-checkbox>
      <label for="remember-me" class="m-0">Remember Me</label>
    </div>

    <p class="text-blue-500 hover:cursor-pointer">Forgot Password?</p>
  </div>
  <!-- login button -->
  <div
    class="px-2 font-poppins font-semibold flex items-center justify-center my-6"
  >
    <p-button 
      label="Log In"
      icon="pi pi-sign-in"
      [fluid]="true"
      iconPos="right"
      type="submit"
      [disabled]="!traineeLoginForm.valid"
      class="font-poppins"
    ></p-button>
  </div>

  <!-- prime ng -->
</form>
