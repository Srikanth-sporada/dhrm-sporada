<div class="mx-2">
 <!-- header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:h-auto">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon> polymer</mat-icon> Biometric Punch Data - Transfer Posting<hr/>
    </h1>
    <p class="mt-1 text-gray-400">Transfer Biometric Punch Data </p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>

  <!-- transfet biometric punch data -->
   <div>
    <!-- transfet biometric punch data -->
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Action <mat-icon>arrow_range</mat-icon>
        </h1>
      </div>
   <div>
     <!-- first row -->
     <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
      <!-- from date-->
     <div class="w-full sm:w-1/3">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">From Date</label> <br>
      <p-calendar 
        dateFormat="yy-mm-dd"
        styleClass="w-full !font-poppins"
        [formControl]="fromDateControl"
        [maxDate]="maxDate" 
        [minDate]="minDate"
        [showIcon]="true" >
     </p-calendar>  
     </div>
    <!-- todate -->
     <div class="w-full sm:w-1/3">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">To Date</label> <br>
      <p-calendar 
        dateFormat="yy-mm-dd"
        styleClass="w-full !font-poppins"
        [formControl]="toDateControl"
        (onSelect)="validateFromDate()"
        [maxDate]="maxDate"
        [minDate]="minDate"
        [showIcon]="true" >
     </p-calendar>
     </div>
     <!-- execute -->
        <div class="mt-8 ml-3">
          <p-button 
            icon="pi pi-arrow-circle-right"
            iconPos="right"
            styleClass="rounded-[1.5rem] mt-2"
            (onClick)="executeQuery()"
            label="Execute" 
            [disabled]="!fromDateControl.valid || !toDateControl.valid" 
          >
        </p-button> 
        </div>
     </div>
     </div>
    </div>
   </div>

   <!-- loader -->
    <app-loader *ngIf="loader.isLoding | async"></app-loader>
</div>
