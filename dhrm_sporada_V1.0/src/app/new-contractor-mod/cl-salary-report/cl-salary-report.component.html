<div class="mx-3">
   <!-- Cl salary header -->
  <div
    class="!flex gap-2 py-2 !items-center !justify-between !shadow-md !my-4 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20"
  >
    <div class="flex items-start justify-start flex-col">
      <h1
        class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600"
      >
        <mat-icon>list_alt</mat-icon>CL Salary Reports
        <hr />
      </h1>
      <p class="mt-1 text-gray-400">Download Contract Labour Salary Report</p>
    </div>
    <!-- user details -->
    <h1
      class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right"
    >
      {{ userDetails }}
    </h1>
  </div>
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400">
    <!-- header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Download CL Salary Report<mat-icon>list_alt</mat-icon>
        </h1>
      </div>
   <div>
     <!-- download options -->
    <div>
     <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
          <!-- report type-->
          <div class="font-poppins w-full">
              <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Report Type</label> <br>
              <p-dropdown 
                [options]="reportType"
                [(ngModel)]="selectedReportType"
                optionLabel="name"
                optionValue="code"
                styleClass="w-full" 
                placeholder="Select Report Type"></p-dropdown>
          </div>
          <!-- month -->
        <div class="w-full" *ngIf="(selectedReportType === 'OTMSAL' || selectedReportType === 'PRSAL')">
          <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">Month</label> <br>
          <p-calendar 
            [(ngModel)]="from"
            dateFormat="MM-yy"
             view="month"
            styleClass="w-full !font-poppins"
            [showIcon]="true" >
        </p-calendar>
        </div>
            <!-- Contractor-->
          <div class="font-poppins w-full" *ngIf="(selectedReportType === 'CTSAL' || selectedReportType === 'PRSAL')">
              <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Contractor</label> <br>
              <p-dropdown 
                [options]="Con_list"
                [(ngModel)]="selectedContractor"
                optionLabel="Cont_company_name"
                optionValue="Con_Id"
                styleClass="w-full" 
                placeholder="Select Contractor"></p-dropdown>
          </div>
          <!-- Plant-->
          <div class="font-poppins w-full">
              <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Plant</label> <br>
              <p-dropdown 
                [options]="plantlist"
                [(ngModel)]="plant"
                [disabled]="isadmin === 'false'"
                optionLabel="plant_name"
                optionValue="plant_code"
                styleClass="w-full" 
                placeholder="Select Plant"></p-dropdown>
          </div>
          <!-- download btn-->
            <p-button 
            icon="pi pi-download"
            label="Download" 
            styleClass="ml-3 rounded-[1.5rem] mt-9"
            (onClick)="getData()"
            [disabled]="loading" 
            >
          </p-button>
     </div>
    </div>
   </div>
  </div>
