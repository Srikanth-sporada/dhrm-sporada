<!--  header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>co_present</mat-icon>Employee Report <hr/>
    </h1>
    <p class="mt-1 text-gray-400">Download Employee Report</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>

  <!-- filters -->
   <div>
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
      </div>
     <div [formGroup]="empForm">

     <!-- row one --> 
     <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2" >
       <!-- application status -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Application Status</label> <br>
          <p-dropdown 
            [options]="statusOptions"
            formControlName="AplnStatus"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            placeholder="Select Status" ></p-dropdown>
       </div>
       <!-- Active Status -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Active Status</label> <br>
          <p-dropdown 
            [options]="activityStatusOptions"
            formControlName="activeState"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            placeholder="Select Status" ></p-dropdown>
       </div>
       <!-- Category -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Category</label> <br>
          <p-dropdown 
            [options]="roleOptions"
           formControlName="category"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            placeholder="Select Category" ></p-dropdown>
       </div>
       
     </div>
     <!-- filters second row -->
      <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
         <!-- Plant -->
       <div class="font-poppins w-full sm:w-1/3">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Plant</label> <br>
          <p-dropdown 
            [options]="plantlist"
            [disabled]="isadmin === 'false'"
            formControlName="plant"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full"
            placeholder="Select Plant" ></p-dropdown>
       </div>
       <!-- search btn -->
        <div class="mt-8 ml-3">
          <p-button 
            icon="pi pi-download"
            styleClass="rounded-[1.5rem] mt-2"
            (onClick)="download()"
            label="Download"  
          >
        </p-button> 
        </div>
     </div>
     </div>
  </div>
   </div>
