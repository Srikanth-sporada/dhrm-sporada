<!--  header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>assessment</mat-icon> ARS Reports  <hr/>
    </h1>
    <p class="mt-1 text-gray-400">Download ARS Reports</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>
<!-- filters -->
   <div>
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
      </div>
     <div>
     <!-- row one --> 
     <div class="flex items-center  w-full flex-col sm:flex-row sm:gap-2">
       <!-- report type -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Report Type</label> <br>
          <p-dropdown 
            [options]="reportType"
           [(ngModel)]="selectedReportType" 
            optionLabel="name"
            optionValue="code"
            styleClass="w-full"
            placeholder="Select Report Type" ></p-dropdown>
       </div>
       <!-- from date-->
        <div class="w-full" *ngIf='!yearReport.includes(selectedReportType)'>
          <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">From Date</label> <br>
          <p-calendar 
            [(ngModel)]="from"
             [view]="yearReport.includes(selectedReportType) ? 'year' : ((monthReport.includes(selectedReportType) || monthReport1.includes(selectedReportType))  ? 'month' : 'date')"
            (onSelect)="datechange()"
            [maxDate]="fromMax"
            dateFormat="yy-mm-dd" 
            styleClass="w-full !font-poppins"
            [showIcon]="true" >
        </p-calendar>
        </div>
        <!-- to date -->
        <div class="w-full"  *ngIf="!monthReport.includes(selectedReportType) && !yearReport.includes(selectedReportType) && !monthReport1.includes(selectedReportType)">
          <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">To Date</label> <br>
          <p-calendar 
            [(ngModel)]="to"
            [minDate]="from"
            [maxDate]="max"
            dateFormat="yy-mm-dd" 
            styleClass="w-full !font-poppins"
            [showIcon]="true" >
        </p-calendar>
        </div>
       
     </div>
     <!-- filters second row -->
      <div class="flex items-center  w-full flex-col sm:flex-row sm:gap-2">
          <!-- SAP Type -->
       <div class="font-poppins w-full sm:w-1/3" *ngIf="sapType.includes(selectedReportType)">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">SAP Type</label> <br>
          <p-dropdown 
            [options]="employeeTypeOptions"
           [(ngModel)]="employeeType" 
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            placeholder="Select SAP Type" ></p-dropdown>
       </div>
         <!-- employee type -->
       <div class="font-poppins w-full sm:w-1/3" *ngIf="monthReport.includes(selectedReportType) || sapReport.includes(selectedReportType) ">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Employee Type</label> <br>
          <p-dropdown 
            [options]="employeeTypes"
           [(ngModel)]="employeeType" 
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            placeholder="Select Employee Type" ></p-dropdown>
       </div>
         <!-- Plant -->
       <div class="font-poppins w-full sm:w-1/3">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Plant</label> <br>
          <p-dropdown 
            [options]="plantlist"
           [(ngModel)]="plant"
           [disabled]="!(isadmin === 'true' || (isHrappr === 'true' && selectedReportType === 'HRC'))"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full"
            placeholder="Select Plant" ></p-dropdown>
       </div>
       <!-- download btn -->
        <div class="mt-8 ml-3">
          <p-button 
            icon="pi pi-download"
            styleClass="rounded-[1.5rem] mt-2"
            (onClick)="getData()"
            label="Download" 
            [disabled]="loading" 
          >
        </p-button> 
        </div>
     </div>
     </div>
  </div>
   </div>
