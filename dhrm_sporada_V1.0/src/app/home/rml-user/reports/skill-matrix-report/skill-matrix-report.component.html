<!-- header -->
<div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-auto"
>
  <div class="flex items-start justify-start flex-col">
    <h1
      class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600"
    >
      <mat-icon>bar_chart</mat-icon> Skill Matrix Report
      <hr />
    </h1>
    <p class="mt-1 text-gray-400">Download Skill Matrix Report</p>
  </div>
  <!-- user details -->
  <h1
    class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right"
  >
    {{ userDetails }}
  </h1>
</div>
<!-- filters -->
<div>
  <div
    class="!shadow-md !my-4 !rounded-md h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2"
  >
    <!-- filter header -->
    <div class="relative">
      <h1
        class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2"
      >
        Actions <mat-icon>filter_alt</mat-icon>
      </h1>
    </div>
    <div>
      <!-- row one -->
      <div
        class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2"
        [formGroup]="form"
      >
        <!-- department -->
        <div class="font-poppins w-full sm:w-1/3">
          <label
            for="status"
            class="text-gray-400 font-poppins mt-3 mb-1 font-semibold"
            >Department</label
          >
          <br />
          <p-dropdown
            [options]="departments"
            formControlName="department"
            optionLabel="dept_name"
            optionValue="dept_slno"
            styleClass="w-full"
            placeholder="Select Department"
          >
           <ng-template let-dept pTemplate="item">
              <div class="flex align-items-center gap-2">
                  <span>{{ dept.dept_slno + '-' + dept.dept_name }}</span>
                </div>
            </ng-template>
        </p-dropdown>
        </div>
        <p-button
            icon="pi pi-download"
            label="Download"
            styleClass="rounded-[1.5rem] mt-8 ml-3"
            (onClick)="download()"
             [hidden]="button1"
          >
          </p-button>
          <p-button
            icon="pi pi-times"
            styleClass="rounded-[1.5rem] mt-8 ml-3 bg-red-400 border-none outline-none"
            (onClick)="clear()"
          >
          </p-button>
      </div>
    </div>
  </div>
</div>

<!-- loader -->
 <div>
   <app-loader *ngIf="loader.isLoding | async"></app-loader>
 </div>
