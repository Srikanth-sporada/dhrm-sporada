<ng-template #content let-modal>
  <div style="display: flex; align-items: center; justify-content: center">
    <img width="700px" height="500px" [src]="imgUrl" alt="Question" />
  </div>
</ng-template>

<div class="mx-2">
     <!--  header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>assignment</mat-icon>Trainee Test Page<hr/>
    </h1>
    <p class="mt-1 text-gray-400">Attend Trainee Test</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>
 
    <!-- tainee application actions -->
   <div>
    <!-- tainee application actions -->
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400">
    <!-- action header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Actions <mat-icon>filter_alt</mat-icon>
        </h1>
      </div>
   <form [formGroup]="form">
     <!-- action First Row -->
      <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
       <!-- modules drop down -->
       <div class="font-poppins w-full sm:w-1/3">
          <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Module</label> <br>
          <p-dropdown 
            [options]="modules"
            (onChange)="Qualified($event)"
            formControlName="module"
            optionLabel="module_name"
            styleClass="w-full" 
            placeholder="Select Module" ></p-dropdown>
       </div>
      <!-- search value -->
     <div class="w-full p-fluid sm:w-1/3">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">Type</label> <br>
      <input 
       type="text" 
       pInputText
       styleClass="w-full !font-poppins" 
       formControlName="test"
       [readOnly]="true" />
     </div>
     </div>
   </form>
  </div>
   </div>

  <div class="pt-2">
    <div class="container-fluid ">
      <div class="round">
        <div class="pt-2 pl-3 overflow-hidden">
          
          <br /><br />
          <app-loader *ngIf="loader.isLoding | async; else show"></app-loader>
          <!-- trainee question -->
          <ng-template #show>
            <div *ngIf="!loading" class="body form-group">
              <body>
                <b>
                  <p style="white-space: pre" class="mb-3">{{ qualified }}</p>
                </b>
                <b>
                  <p style="white-space: pre" class="mb-3">{{ offline }}</p>
                </b>
                <form *ngIf="offline == ''" [formGroup]="formtest">
                  <table class="table" style="width: 100%">
                    <thead>
                      <tr class="bg-blue-600">
                        <td style="width: 10%" class="text-white font-semibold text-xl rounded-s-lg">Sno</td>
                        <td style="width: 90%" class="text-white font-semibold text-xl rounded-e-lg">Questions</td>
                      </tr>
                    </thead>
                    <tbody *ngFor="let a of questions; let i = index">
                      <tr>
                        <td>{{ i + 1 }}</td>
                        <td style="white-space: pre">
                          {{ a.question }}<br /><br />
                          <div
                            *ngIf="
                              a.image_filename != null &&
                              a.image_filename != 'null' &&
                              a.image_filename != 'NULL' &&
                              a.image_filename != 'undefined' &&
                              a.image_filename != ''
                            "
                          >
                            <button (click)="open(content, a.image_filename)">
                              <img
                                [src]="url + '/qbank/' + a.image_filename"
                                width="300px"
                                ngbTooltip="click to view image"
                                height="200px"
                                alt="question"
                              /></button
                            ><br /><br />
                          </div>
                           <p-dropdown 
                                [options]="choices"
                                (onChange)="load_answers(
                                $event,
                                i + 1,
                                a.qslno,
                                a.correct_answer)"
                                formControlName="answers"
                                optionLabel="label"
                                optionValue="value"
                                [ngClass]="{
                                'invalid-select':
                                    form.get('answers')?.invalid &&
                                    form.get('answers')?.touched
                               }"
                                styleClass="w-1/4" 
                                placeholder="Choose Your Answer" ></p-dropdown>
                          <!-- <select
                            class="form-control-md"
                            formControlName="answers"
                            [ngClass]="{
                              'invalid-select':
                                form.get('answers')?.invalid &&
                                form.get('answers')?.touched
                            }"
                            (change)="
                              load_answers(
                                $event,
                                i + 1,
                                a.qslno,
                                a.correct_answer
                              )
                            "
                          >
                            <option value="">Choose your answer</option>
                            <option *ngFor="let choice of choices">
                              {{ choice }}
                            </option>
                          </select> -->
                          <!-- <select class="form-control-md"
                                                    [(ngModel)]="a.selectedAnswer"
                                                    [ngClass]="{'invalid-select': a.selectedAnswer === '' || !a.selectedAnswer}"
                                                    (change)="load_answers($event, i + 1, a.qslno, a.correct_answer)">
                                                        <option value="">Choose your answer</option>
                                                        <option *ngFor="let choice of choices">{{choice}}</option>
                                                    </select> -->
                        </td>
                      </tr>
                    </tbody>
                  </table>
                  <!-- save btn -->
                  <button
                    pButton
                    label="Save"
                    icon="pi pi-save"
                    (click)="submit()"
                    [disabled]="flag"
                    type="submit"
                  ></button>
                </form>
              </body>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
