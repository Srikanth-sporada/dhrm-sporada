<div class="mx-2">
        <!-- header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 !rounded-md !mx-auto !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>how_to_vote</mat-icon> Offline Test Evaluation<hr/>
    </h1>
    <p class="mt-1 text-gray-400">Manage Trainee Offline Test</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>

        <div *ngIf="loading">
            <app-loader></app-loader>
        </div>
         <!-- test evaluation form -->
        <div class="flex items-center justify-center !font-poppins">
            <div class="mx-5" *ngIf="!loading">
                <form [formGroup]="form" class="w-[400px]">
                    <div class="!font-poppins shadow-lg px-2 py-2">
                        <!-- trainee -->
                        <div class="w-full px-2 mt-3">
                            <label class="text-blue-600 flex items-center justify-start gap-1 -mb-2">
                            <mat-icon class="text-2xl text-blue-600 h-0 w-0">co_present</mat-icon>
                            Trainee
                        </label><br />
                        <p-dropdown 
                            formControlName="trainee"
                            [options]="trainee"
                            optionLabel="trainee_idno"
                            optionValue="trainee_idno"
                            styleClass="w-full"
                            (onChange)="store_trainee($event)"
                            placeholder="Select Trainee">
                             <ng-template let-trainee pTemplate="item">
                                <div class="flex align-items-center gap-2">
                                    <span>{{ trainee.trainee_idno + '-' + trainee.fullname }}</span>
                                </div>
                            </ng-template>
                        </p-dropdown>
                        </div>
                         <!-- module -->
                        <div class="w-full px-2 mt-3">
                            <label class="text-blue-600 flex items-center justify-start gap-1 -mb-2">
                            <mat-icon class="text-2xl text-blue-600 h-0 w-0">assignment</mat-icon>
                            Module
                        </label><br />
                        <p-dropdown 
                            formControlName="module"
                            [options]="modules"
                            optionLabel="module_name"
                            styleClass="w-full"
                            (onChange)="get_test_status($event)"
                            placeholder="Select Module">
                        </p-dropdown>
                        </div>
                         <!-- Exam type -->
                        <div class="w-full px-2 mt-3">
                            <label class="text-blue-600 flex items-center justify-start gap-1 -mb-2">
                            <mat-icon class="text-2xl text-blue-600 h-0 w-0">type_specimen</mat-icon>
                            Exam Type
                        </label><br />
                        <p-dropdown 
                            formControlName="test"
                            [options]="examTypeOptions"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full"
                            placeholder="Select Exam Type">
                        </p-dropdown>
                        </div>
                        <!-- exam papper-->
                        <div class="w-full px-2 mt-3">
                            <label for="withoutgrouping" class="text-blue-600 flex items-center justify-start gap-1 -mb-2">
                            <mat-icon class="text-2xl text-blue-600 h-0 w-0">assignment</mat-icon>
                           Exam Papper
                            </label> <br>
                            <input 
                            class="block w-full text-sm text-gray-500 file:me-4 file:py-2 file:px-4 file:!rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 file:disabled:opacity-50 file:disabled:pointer-events-none dark:text-neutral-500 dark:file:bg-blue-500 dark:hover:file:bg-blue-400"
                               type="file" 
                               (change)="offline_upload($event)" 
                               [disabled]="form.invalid">
                        </div>
                        <!-- score -->
                        <div class="w-full px-2 mt-3 p-fluid">
                            <label for="withoutgrouping" class="text-blue-600 flex items-center justify-start gap-1 -mb-2">
                            <mat-icon class="text-2xl text-blue-600 h-0 w-0">leaderboard</mat-icon>
                           Score
                            </label> <br>
                            <p-inputNumber 
                                mode="decimal" 
                                inputId="withoutgrouping"
                                [maxlength]="2"
                                formControlName="score"
                                styleClass="w-full"
                                [useGrouping]="false" 
                            ></p-inputNumber>
                        </div>
                        <br>
                        <!-- upload btn -->
                        <div class="w-full flex items-center justify-center">
                            <button 
                             (click)="offline_page()"
                             pButton
                             icon="pi pi-upload"
                             iconPos="right"
                             label="Upload"
                             [disabled]="form.invalid || moduleStatus == 'false'"></button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
</div>
