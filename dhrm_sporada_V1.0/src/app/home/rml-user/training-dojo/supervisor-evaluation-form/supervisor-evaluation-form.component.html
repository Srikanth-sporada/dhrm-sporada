<div class="body form-group">
   <div class="!shadow-md !my-4 !rounded-md h-auto pb-3 !px-4 !font-poppins sm:h-40 border border-gray-400 mx-2">
    <div style="display: flex; flex-wrap: wrap; gap: 30px;" class="mt-3">
        <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Employee Name:</label>
            <span>{{ emp_det?.fullname }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Department Name:</label>
            <span>{{ emp_det?.dept_name }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Line Name:</label>
            <span>{{ emp_det?.Line_Name }}</span>
        </div>

    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 30px;">

         <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Operation Name:</label>
            <span>{{ emp_det?.oprn_desc }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Current Skill Level:</label>
            <span style="margin-bottom: 1%;">{{ emp_det?.Level_No }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label class="text-blue-600 font-semibold">Proposed Skill Level:</label>
            <span style="margin-bottom: 1%;">{{ emp_det?.Level_No + 1 }}</span>
        </div>
    </div>

    <div
        style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <label style="white-space: nowrap;" class="text-blue-600 font-semibold">Recommended For Skill Upgrade:</label>
            <select style="font-size: 14px; width: 75px; height: 34px; border-radius: 0px; border-color: black;" [(ngModel)]="recom" name="recommendation">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div style="display: flex; align-items: center; gap: 10px;">
            <button pButton label="Submit" icon="pi pi-send" (click)="submit()"></button>
            <button pButton label="Back" icon="pi pi-arrow-circle-left" style="margin-left: 2%;" onclick="history.back()"></button>
        </div>
    </div>
   </div>
    <!-- table -->
    <div class="h-[90svh] lg:h-[90vh] xl:h-[90vh] sm:h-[75vh] shadow-md rounded-md border border-gray-400 overflow-y-scroll mx-2 relative">
        <form>
            <table id="table" class="table-auto !w-full">
                <!-- table head -->
                <thead class="sticky top-0">
                    <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center xl:!text-left">
                        <th class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center">Sno</th>
                        <th class="!text-white !px-2 !py-2 !border-none !border-0">Abservent Point</th>
                        <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center">
                            <div class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Rating</div>
                            <!-- <div style="display: flex;" class="items-center justify-center">
                                <div
                                    class="!text-white !px-2 !py-2 !border-none !border-0 text-center">
                                    Good
                                </div>
                                <div class="!text-white !px-2 !py-2 !border-none !border-0 text-center">
                                    Average
                                </div>
                            </div> -->
                        </th>
                        <th class="!text-white !rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center">Remarks</th>
                    </tr>
                </thead>
                <!-- table body -->
                <tbody>
                    <tr *ngFor="let q of Abser_Point; let i = index"  class="!border-none !border-0 !hover:bg-blue-200 !font-poppins cursor-pointer">
                        <td class="!px-2 !py-4 !rounded-s-md text-center">{{ i + 1 }}</td>
                        <td class="!px-2 !py-4 !rounded-s-md text-center">
                            <textarea
                               class="w-full"
                               pInputTextarea
                                disabled="true">
                                {{ q.Abservent_Point }}
                            </textarea>
                        </td>
                        <td class="!px-2 !py-4 !rounded-s-md text-center">
                            <div
                                style="display: flex; justify-content: center; align-items: center;" class="gap-3">
                                <label style="display: flex; align-items: center; gap: 5px;">
                                    <input type="radio" name="rating_{{ i }}" value="Good" [(ngModel)]="ratings[i]" [checked]="ratings[i] === 'Good'" pInputText> Good
                                </label>
                                <label style="display: flex; align-items: center; gap: 5px;">
                                    <input type="radio" name="rating_{{ i }}" value="Average" [(ngModel)]="ratings[i]" [checked]="ratings[i] === 'Average'" pInputText> Average
                                </label>
                            </div>
                        </td>
                        <td class="!px-2 !py-4 !rounded-s-md text-center">
                            <textarea
                               class="w-full"
                                [(ngModel)]="remarks[i]"
                                pInputTextarea
                                name="remark{{ i }}"
                                (change)="RemarkChange($event, i)"
                              ></textarea>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
        <!-- loader -->
         <app-loader *ngIf="loader.isLoding | async"></app-loader>
    </div>    

</div>
