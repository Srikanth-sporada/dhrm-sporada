<!-- add and update bank ng template -->
<ng-template #content let-modal>
  <div class="modal-content-container">
    <!-- bank header -->
       <div>
            <div class="bg-blue-600 flex items-center justify-start py-4">
                <div class="flex items-center justify-start text-white font-poppins mx-4 gap-2">
                <div  class="px-2 py-2 rounded-md bg-[var(--bg-transparent)] flex items-center justify-center">
                    <mat-icon class="h-0 w-0 text-2xl opacity-100">{{!editing_flag ? 'add_circle' : 'edit'}}</mat-icon>
                </div>
                <h4 class="text-2xl text-white">{{!editing_flag ? 'Add Bank' : 'Update Bank'}}</h4>
            </div>
        </div>
       </div>
    <br />
    <!-- bank form -->
    <form [formGroup]="form">
      <!-- bank name input -->
        <div class="mx-4">
          <label class="text-blue-600 flex items-center justify-start gap-1 -mb-2" for="code">
            <mat-icon class="text-2xl text-blue-600 h-0 w-0">text_fields</mat-icon>
           Bank Name
          </label>
          <br />
          <input
            class="w-full bg-transparent outline outline-gray-400 outline-1 shadow-none -mt-10 -mb-10 rounded-md h-[40px] focus:outline-2 focus:outline focus:outline-blue-600 px-2"
            type="text"
            id="code"
            formControlName="bank_name"
          />
        </div>
        <!-- IFSC code input -->
        <div class="mx-4 mt-4">
          <label class="text-blue-600 flex items-center justify-start gap-1 -mb-2" for="c-name">
            <mat-icon class="text-2xl text-blue-600 h-0 w-0">code</mat-icon>
            IFSC Code
          </label>
          <br />
          <input
            class="w-full bg-transparent outline outline-gray-400 outline-1 shadow-none -mt-10 -mb-10 rounded-md h-[40px] focus:outline-2 focus:outline focus:outline-blue-600 px-2"
            type="text"
            id="c-name"
            formControlName="bank_code"
          />
        </div>
      <br />
    </form>
  </div>

  <!-- bank footer -->
  <div class="modal-footer bg-gray-100">
    <!-- add btn -->
    <button
      *ngIf="editing_flag == false"
      type="button"
      [disabled]="!form.valid"
      class="btn btn-primary btn-lg rounded-[1.25rem] px-3 shadow-md bg-blue-600"
      (click)="save()"
      (click)="modal.close('Close click')"
    >
      Add Bank
    </button>
    <!-- update btn -->
    <button
      *ngIf="editing_flag == true"
      type="button"
      class="btn btn-warning btn-lg rounded-[1.25rem] px-3 shadow-md text-white"
      (click)="editSave()"
      (click)="modal.close('Close click')"
    >
      Update Bank
    </button>
    <!-- cancel btn -->
    <button
      type="button"
      class="btn btn-light btn-lg rounded-[1.25rem] px-3 shadow-md"
      (click)="reset()"
      (click)="modal.close('Close click')"
    >
      Cancel
    </button>
  </div>
</ng-template>

<div class="mx-2">
  <!-- BANK master filter -->
  <div class="!shadow-md !my-4 !rounded-md !mx-auto h-full pb-2 !px-4 !font-poppins sm:h-40 border border-gray-400 ">
     <!-- filter header -->
     <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
       <!-- primeNG speedDial -->
        <p-speedDial 
          [model]="items" 
          direction="left"
          className="absolute right-0 top-0"
          buttonClassName="!h-[2.5rem] !w-[2.5rem]"
        >
        </p-speedDial>
     </div>
     <!-- BANK master filter divison -->
     <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
        <!-- bank search  filter -->
       <div class="font-poppins w-full sm:w-1/3 p-fluid">
          <label for="search" class="text-gray-400 font-poppins font-semibold mt-3 mb-1">Search</label> <br>
          <input 
            type="text" 
            pInputText
            name="search"
            class="w-full"
            id="search"
            (input)="searchBankByName($event)"
            placeholder="🔍︎ Search Bank"
          >
       </div>
      </div>
  </div>

  <app-loader *ngIf="loader.isLoding | async; else show"></app-loader>

  <!-- bank master table -->
  <ng-template #show>
    <div class="h-[90svh] lg:h-[52vh] xl:h-[58vh] sm:h-[45vh] shadow-md rounded-md border border-gray-400 overflow-y-scroll">
        <table id="table" class="table-auto !w-full">
          <!-- table head -->
          <thead class="sticky top-0">
            <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center text-nowrap xl:!text-left">
              <th
                class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center text-nowrap"
              >
                SNo
              </th>
               <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center text-nowrap">Bank Code</th>
              <th class="!text-white !px-2 !py-2 !border-none !border-0">Bank Name</th>
              <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center text-nowrap">IFSC Code</th>

              <th class="!text-white !rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center text-nowrap">Action</th>
            </tr>
          </thead>
          <!-- table body -->
          <tbody>
            <tr 
             *ngFor="let i of dummy; let a = index"
             class="!border-none !border-0 !hover:bg-blue-200 !font-poppins cursor-pointer"
             >
              <td class="!px-2 !py-4 !rounded-s-md text-center text-nowrap">{{ a + 1 }}</td>
              <td class="!px-2 !py-4 !rounded-s-md text-center text-nowrap text-blue-600 font-semibold">{{ i.Slno }}</td>
              <td class="!px-2 !py-4 !rounded-s-md">{{ i.bank_name }}</td>
              <td class="!px-2 !py-4 !rounded-s-md text-center text-nowrap text-blue-600 font-semibold">{{ i.bank_code }}</td>
             <!-- action buttons -->
              <td>
                <button
                  (click)="edit(i.Slno, a)"
                  (click)="opentoedit(content)"
                >
                  <mat-icon class="text-blue-600 text-[20px]">edit</mat-icon>
                </button>
                <button
                  (click)="deleteBank($event,i.Slno, a)"
                >
                  <mat-icon class="text-red-600 text-[20px]">delete</mat-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
    </div>
  </ng-template>
</div>
