<div class="mt-4 mx-4">
<!-- Ocm header -->
 <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 !rounded-md !mx-auto !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-auto">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>punch_clock</mat-icon>Organizational Change Management<hr/>
    </h1>
    <p class="mt-1 text-gray-400">View organizational change management Reports</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>
  <!-- ocm filters -->
  <div class="options">
   </div>
    <div class="!shadow-md !my-4 !rounded-md !mx-auto h-full pb-3 !px-4 !font-poppins sm:h-25 border border-gray-400 ">
    <!-- filter header -->
      <div class="relative mb-2">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
      </div>
    <div class="flex items-center flex-col md:flex-row gap-4">
       <!-- prime ng calander -->
     <div class="w-full sm:w-1/3">
      <label for="date" class="font-semibold text-gray-400">Year</label> <br>
      <p-calendar 
        [(ngModel)]="date"
        view="year"
        dateFormat="yy"
        styleClass="w-full !font-poppins"
        [showIcon]="true" >
     </p-calendar>
     </div>
    <!-- primeg dropdown -->
     <div class="w-full sm:w-1/3">
      <label for="plant" class="text-gray-400 font-semibold">Plant</label> <br>
      <p-dropdown 
        [options]="plants" 
        [(ngModel)]="selectedPlant" 
        placeholder="Select a Plant"
        optionLabel="plant_name"
        [checkmark]="true"
        optionValue="plant_code"
        styleClass="w-full !font-poppins"
        [disabled]="isadmin == 'false'" >
      </p-dropdown>
     </div>
    </div>
  </div>
  </div>
  <!-- ocm reports -->
  <div>
    <!-- excess hour chart -->
    <app-excess-hours-chart [date]="date" [plant]="selectedPlant"></app-excess-hours-chart>
    <!-- miss punch trend chart -->
    <app-miss-picnh-trend [date]="date" [plant]="selectedPlant"></app-miss-picnh-trend>
    <!-- continious 11 days working -->
    <app-contworking [plant]="selectedPlant"></app-contworking>
  </div>
