<div class="mx-4 rounded-md border border-gray-400 shadow-md my-4">

  <p class="py-2 sm:text-[1.35rem] xl:text-[2rem] text-center text-gray-600 font-semibold flex items-center justify-center gap-4"> 
    <mat-icon class="text-blue-600 sm:text-[1.35rem] xl:text-[1.8rem]">alarm</mat-icon>
    Continuously 11 Days Working
  </p>
   <!-- prime ng calander -->
     <div class="w-[90%] sm:w-[50%] xl:w-[25%] lg:w-[50%] sm:ml-9 mx-4">
      <label for="date" class="font-semibold text-gray-400">Month</label> <br>
      <p-calendar 
        [(ngModel)]="date"
        view="month"
        (ngModelChange)="getData()"
        dateFormat="MM"
        dataType="string"
        styleClass="w-full !font-poppins"
        [showIcon]="true" >
     </p-calendar>
     </div>
  <canvas
   class="chart"
    baseChart
    class="chart"
    [data]="barChartData"
    [options]="barChartOptions"
    [plugins]="barChartPlugins"
    [type]="barChartType"
  >
  </canvas>
</div>
