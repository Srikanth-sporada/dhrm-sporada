<div style='overflow-x:auto'>
<div class="mx-5">
    <!-- basic details -->
        <h3 class="ml-3 text-2xl text-blue-600 md:my-2 lg:my-4 font-semibold">
          Language Details
          <mat-icon>language</mat-icon>
        </h3>
    <table class="table-auto w-full !font-poppins">
        <thead>
        <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center xl:!text-left">
        <th class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center" scope="col" style="width: 30%">Language</th>
        <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center" scope="col">Speak</th>
        <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center" scope="col">Write</th>
        <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center" scope="col">Read</th>
        <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center" scope="col">MotherTongue</th>
        <th class="!text-white rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center" scope="col">Understand</th>
        </tr>
        <tr *ngFor="let data of languageList">
        <td ><input class="form-control"  type="text" [(ngModel)]="data.language" readonly (click)="sendData()">
        
        </td>
        <td ><input type = "checkbox" [checked]="data.speak == 1" (click)="sendData()" (click)="changestatus($event, data, 'speak')"></td>
        <td ><input type = "checkbox" [checked]="data.read == 1" (click)="sendData()" (click)="changestatus($event, data,'read')"></td>
        <td><input type = "checkbox" [checked]="data.write == 1" (click)="sendData()" (click)="changestatus($event, data,'write')"></td>
        <td><input type = "checkbox" [checked]="data.mothertongue == 1" (click)="sendData()" (click)="changestatus($event, data,'mothertongue')"></td>
        <td><input type = "checkbox" [checked]="data.understand == 1" (click)="sendData()" (click)="changestatus($event, data,'understand')"></td>
    </tr>
        <tr>
    </thead>    
    </table>

</div> </div>

<div class="w-full flex items-center justify-center mt-3">
   <button 
    [disabled]="disabled" 
    pButton
    label="Save"
    icon="pi pi-save" 
    (click)="submit()" 
    (click)="sendData()" >
</button>
</div>

<span style = 'float:right;font-size: 20px;color: green;' class="animate" @slowAnimate *ngIf="state" >&nbsp; Details are saved</span>
