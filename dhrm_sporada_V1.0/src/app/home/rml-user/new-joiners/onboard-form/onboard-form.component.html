<div class="h-full">
  <div class="row justify-content-md-center mx-4 mt-3">
    <div class="shadow round w-full">
      <div class="px-2 mx-2">
        <!-- trainee onboard header header -->
        <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
            <div class="flex items-start justify-start flex-col">
            <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-1 text-blue-600">
            <mat-icon>model_training</mat-icon> Trainee Onboard  <hr/>
            </h1>
            <p class="mt-1 text-blue-600 font-semibold ml-2">{{ fullname | uppercase}} - {{ trainee_id || applicationNumber }} </p>
            </div>
        </div>
        <!-- trainee onboard form -->
        <form [formGroup]="form">
            <!--  row one -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- ifsc code -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                IFCS Code<span class="text-red-600 ml-2">*</span>
            </label> <br>
            <input 
            type="text" 
            pInputText
            styleClass="w-full !font-poppins" 
            formControlName="ifsc_code" />
            
            </div>
            <!--bank name -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Bank Name<span class="text-red-600 ml-2">*</span>
            </label> <br>
            <input 
            type="text" 
            pInputText
            styleClass="w-full !font-poppins" 
            formControlName="bank_name"  />
            </div>
            <!-- account number -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Account Number<span class="text-red-600 ml-2">*</span>
            </label> <br>
            <input 
            type="text" 
            pInputText
            styleClass="w-full !font-poppins" 
            formControlName="account_number"  />
            </div>
            </div>
            <!--  row two -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- trainee id -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
              Gen ID
            </label> <br>
            <input 
            type="text" 
            pInputText
            class="w-full !font-poppins !bg-gray-100" 
            formControlName="trainee_id"
            [readonly]="true" />
            
            </div>
             <!-- Biometric id -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Biometric ID
            </label> <br>
            <input 
            type="text" 
            pInputText
            class="w-full !font-poppins bg-gray-100" 
            formControlName="bnum"
            [readonly]="true" />
            
            </div>
            <!-- category -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Category</label> <br>
                <p-dropdown 
                    [options]="category"
                    formControlName="category"
                    optionLabel="categorynm"
                    optionValue="categorynm"
                    styleClass="w-full" 
                    placeholder="Select Category" ></p-dropdown>
            </div>
            <!-- Contractors -->
            <div class="font-poppins w-full" *ngIf="contractorsList.includes(form.value.category) || basic[0].cont_id !== null">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Contractor</label> <br>
                <p-dropdown 
                    [options]="contractorData"
                    formControlName="cont_id"
                    optionLabel="Cont_company_name"
                    optionValue="con_id"
                    styleClass="w-full" 
                    placeholder="Select Contractor" ></p-dropdown>
            </div>
            </div>
            <!--  row three -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
              <!-- dojo training -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">DOJO Training</label> <br>
                <p-dropdown 
                    [options]="dojoTrainingOptions"
                    formControlName="dojoTraining"
                    optionLabel="label"
                    optionValue="value"
                    styleClass="w-full" 
                    placeholder="Select Training" ></p-dropdown>
            </div>
            <!-- department -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Department <span class="text-red-600 ml-2">*</span></label> <br>
                <p-dropdown 
                    [options]="department"
                    (onChange)="getline_Role($event)"
                    formControlName="department"
                    optionLabel="dept_name"
                    optionValue="dept_slno"
                    styleClass="w-full" 
                    placeholder="Select Department" ></p-dropdown>
            </div>
            <!-- line -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Line<span class="text-red-600 ml-2">*</span>
                </label> <br>
                <p-dropdown 
                    [options]="line"
                    formControlName="line"
                    optionLabel="line_name"
                    optionValue="line_code"
                    styleClass="w-full" 
                    placeholder="Select Line" ></p-dropdown>
            </div>
            </div>
             <!--  row four -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- role or activity -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Role | Activity <span class="text-red-600 ml-2">*</span>
                </label> <br>
                <p-dropdown 
                    [options]="Role"
                    (onChange)="onRoleChange($event)"
                    formControlName="Role_Id"
                    optionLabel="Role_Name"
                    optionValue="Role_Id"
                    styleClass="w-full" 
                    placeholder="Select Role"></p-dropdown>
            </div>
            <!-- Reporting to -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Reporting To<span class="text-red-600 ml-2">*</span></label> <br>
                <p-dropdown 
                    [options]="reporting_to"
                    formControlName="reportingto"
                    optionLabel="emp_name"
                    optionValue="empl_slno"
                    styleClass="w-full" 
                    placeholder="Select Employee" ></p-dropdown>
            </div>
            <!-- status -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Status<span class="text-red-600 ml-2">*</span>
                </label> <br>
                <p-dropdown 
                    [options]="active_status"
                    (onChange)="rel()"
                    formControlName="active_status"
                    (onChange)="change($event)"
                    optionLabel="label"
                    optionValue="value"
                    styleClass="w-full" 
                    placeholder="Select Status" ></p-dropdown>
            </div>
            </div>
            <!--  row five -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- DOJ -->
            <div class="w-full">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Date Of Joining <span class="text-red-600 ml-2">*</span>
            </label> <br>
            <p-calendar 
                formControlName="doj"
                [minDate]="minDate"
                [maxDate]="today"
                dateFormat="yy-mm-dd"
                styleClass="w-full !font-poppins"
                [showIcon]="true" >
            </p-calendar>
            </div>
            <!-- DOL -->
            <div class="w-full">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Date Of Leaving <span class="text-red-600 ml-2">*</span>
            </label> <br>
            <p-calendar 
                (onChange)="rel()"
                formControlName="dol"
                [disabled]="!readonly"
                dateFormat="yy-mm-dd"
                [minDate]="dolMinDate"
                [maxDate]="dolMaxDate"
                styleClass="w-full !font-poppins"
                [showIcon]="true" >
            </p-calendar>
            </div>
            <!-- remarks of leaving -->
            <div class="font-poppins w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Remarks Of Leaving<span class="text-red-600 ml-2">*</span>
                </label> <br>
                <p-dropdown 
                    [options]="rfr"
                    (onChange)="rel()"
                    formControlName="rfr"
                    optionLabel="R_Reason"
                    optionValue="R_Code"
                    styleClass="w-full" 
                    placeholder="Select Remarks" ></p-dropdown>
            </div>
            </div>
             <!--  row six -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- UAN NUMBER -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                UAN Number<span class="text-red-600 ml-2">*</span>
            </label> <br>
            <input 
            type="text" 
            pInputText
            styleClass="w-full !font-poppins" 
            formControlName="uan"
            [readonly]="readonly" />
            
            </div>
            <!-- Work contract -->
            <div class="w-full p-fluid">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Work Contract<span class="text-red-600 ml-2">*</span>
            </label> <br>
            <input 
            type="text" 
            pInputText
            styleClass="w-full !font-poppins" 
            [readonly]="true"
            formControlName="wcontract"  />
            </div>
            <!-- Process Trained dropdown -->
            <div class="font-poppins w-full" *ngIf="!readonly">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Process Trained<span class="text-red-600 ml-2">*</span>
                </label> <br>
                <p-multiSelect 
                    [options]="process_trained"
                    formControlName="process_trained"
                    optionLabel="oprn_desc"
                    optionValue="oprn_desc"
                    styleClass="w-full" 
                    placeholder="Select Process Trained" ></p-multiSelect>
            </div>
            <!-- process trained -->
            <div class="w-full p-fluid" *ngIf="readonly">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                Process Trained<span class="text-red-600 ml-2">*</span>
            </label> <br>
                <input 
                type="text"
                formControlName="process_trained" 
                pInputText
                styleClass="w-full !font-poppins" 
                [readonly]="true"
                />
            </div>
            </div>
            <!--  row seven -->
            <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
              <!-- payroll Area -->
              <div class="font-poppins w-full">
                  <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                      Payroll Area<span class="text-red-600 ml-2">*</span>
                  </label> <br>
                  <p-dropdown 
                      [options]="payrollArea"
                      optionLabel="PayrollArea"
                      optionValue="PayrollArea"
                      styleClass="w-full"
                      formControlName="payrollArea" 
                      placeholder="Select Payroll Area" >
                    </p-dropdown>
              </div>
               <!-- cost center -->
              <div class="font-poppins w-full p-fluid">
                  <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                     Cost Center<span class="text-red-600 ml-2">*</span>
                  </label> <br>
                  <p-dropdown 
                      [options]="costCenterData"
                      optionLabel="CostCenter"
                      optionValue="CostCenter"
                      styleClass="w-full"
                      formControlName="costCenter"
                      placeholder="Select Cost Center" >
                    </p-dropdown>
                  <!-- <input
                     pInputText
                     [maxlength]="12"
                      styleClass="w-full"
                      formControlName="costCenter" 
                      placeholder="Select Cost Center" /> -->
              </div>
               <!--  Legacy Number one -->
              <div class="font-poppins w-full p-fluid">
                  <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Legacy Number One
                  </label> <br>
                  <input
                     pInputText
                     [minLength]="2"
                     [maxlength]="12"
                      styleClass="w-full"
                      formControlName="legacyNumberOne" 
                      placeholder="Enter Legacy Number One" />
              </div>
            </div>
            <!--  row eight -->
            <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
               <!--  Legacy Number Two -->
              <div class="font-poppins p-fluid w-1/3">
                  <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">
                    Legacy Number Two
                  </label> <br>
                  <input
                     pInputText
                     [minLength]="2"
                     [maxlength]="12"
                      styleClass="w-full"
                      formControlName="legacyNumberTwo" 
                      placeholder="Enter Legacy Number Two" />
              </div>
               <!-- grade -->
              <div class="font-poppins w-1/3">
                  <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Grade</label> <br>
                  <p-dropdown 
                      [options]="grade"
                      formControlName="grade"
                      optionLabel="label"
                      optionValue="value"
                      styleClass="w-full" 
                      placeholder="Select Grade" ></p-dropdown>
              </div>
            </div>
         <!-- action buttons -->
        <div class="w-full mt-8 ml-3 gap-4 mb-4">
            <!-- onboard -->
            <p-button 
               *ngIf="!readonly"
               [disabled]="disbleApproveBtn == 'status' || this.applicationStatus == 'APPOINTED'"
               [hidden]="this.applicationStatus == this.applicationStatusForBtn"
                icon="pi pi-check-square"
                iconPos="right"
                styleClass="rounded-[1.5rem] mt-2"
                (onClick)="submit(false)"
                label="Approve"  
            >
            </p-button> 
            <!-- send for approval -->
            <p-button 
               *ngIf="this.applicationStatus == this.applicationStatusForBtn"
                icon="pi pi-send"
                iconPos="right"
                (onClick)="sendForApprovalByHR()"
                styleClass="rounded-[1.5rem] mt-2"
                label="Send For Approval"  
            >
            </p-button>
              <!-- reject btn *ngIf="applicationStatus == 'SUBMITTED'" -->
            <button 
              pButton 
              *ngIf="applicationStatus == 'SUBMITTED'"
               [disabled]="disbleApproveBtn == 'status'"
              label="Reject" 
              icon="pi pi-times" 
              class="bg-red-500 border-none outline-none rounded-[1.5rem] mt-2 ml-2"  
              type="submit"
             (click)="openDailog()" >
            </button>
            <button
              pButton
              label="Back"
              icon="pi pi-angle-double-left"
              class="bg-purple-600 border-none outline-none rounded-[1.5rem] mt-2 ml-2"
              (click)="goBack()">
             </button>
            <!-- releive btn-->
            <p-button 
                icon="pi pi-reply"
                *ngIf="readonly"
                [disabled]="onboard"
                iconPos="right"
                styleClass="rounded-[1.5rem] mt-2 ml-3"
                (onClick)="submit(false)"
                label="Releive"  
            >
            </p-button> 
            <!-- print id card -->
            <p-button 
                icon="pi pi-print"
                iconPos="right"
                *ngIf="this.status == 'APPOINTED'"
                styleClass="rounded-[1.5rem] mt-2 ml-4 bg-purple-500 outline-none border-none"
                (onClick)="printid()"
                label="Print ID"  
            >
            </p-button> 
        </div>
