<div>
    <!-- actions -->
  <div class="!shadow-md !my-4 !rounded-md h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2 animate" @slowAnimate>
    <!-- action header -->
    <div class="flex item-center justify-between">
      <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2"
      >
        Actions <mat-icon>call_to_action</mat-icon>
      </h1>
    </div>
    <!-- leave apply details -->
    <div>
       <!-- trainee details div -->
        <div
        class="flex items-center justify-around shadow-md px-2 py-3 mt-2 rounded-md mx-auto animate"
        *ngIf="showTraineeDetails"
        @slowAnimate
        >
        <!-- gen id -->
        <p class="text-blue-600 font-semibold">
            Gen ID:
            <span class="text-gray-400 ml-2">{{ traineeData[0]?.gen_id }}</span>
        </p>
        <p class="text-blue-600 font-semibold">
            Plant:
            <span class="text-gray-400 ml-2">
            {{ traineeData[0]?.plant_name }} ({{ traineeData[0]?.plant_code }})
            </span>
        </p>
        <!-- Name -->
        <p class="text-blue-600 font-semibold">
            Name:
            <span class="text-gray-400 ml-2">{{ traineeData[0]?.fullname }}</span>
        </p>
        <!-- Category -->
        <p class="text-blue-600 font-semibold">
            Category:
            <span class="text-gray-400 ml-2">{{
            traineeData[0]?.apprentice_type
            }}</span>
        </p>
        <!-- payroll area -->
        <p class="text-blue-600 font-semibold">
            Payroll Area:
            <span class="text-gray-400 ml-2">{{
            traineeData[0]?.payrollArea
            }}</span>
        </p>
        </div>
      <!-- hr lop apply -->
      <div class="animate"  @slowAnimate>
        <!-- action row one -->
        <div class="flex items-center justify-start w-full flex-col sm:flex-row sm:gap-2">
         <!-- gen id -->
            <div class="w-full p-fluid sm:w-1/3">
            <label for="date" class="font-semibold text-gray-400 mb-1 mt-3"
                >Gen ID</label
            >
            <br />
            <input
                type="text"
                pInputText
                styleClass="w-full !font-poppins"
                placeholder="Enter Gen ID"
                [(ngModel)]="userEnteredGenId"
            />
            </div>
          <!-- lop date -->
            <div class="w-full sm:w-1/3" *ngIf="showTraineeDetails">
                <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">
                    From Date
                </label>
                <br />
                <p-calendar
                [showIcon]="true"
                dateFormat="yy-mm-dd"
                styleClass="w-full"
                [(ngModel)]="lopDate"
                >
                </p-calendar>
            </div>
          <!-- reason -->
            <div class="w-full p-fluid sm:w-1/3" *ngIf="showTraineeDetails">
                <label for="date" class="font-semibold text-gray-400 mb-1 mt-3"
                >Reason</label
                >
                <br />
                <input
                pInputText
                styleClass="w-full"
                [(ngModel)]="lopReason"
                placeholder="Enter Reason"
                />
            </div>
            <!-- search btn -->
            <button
                pButton
                *ngIf="!showTraineeDetails"
                iconPos="right"
                icon="pi pi-search"
                class="mt-10 w-1/3"
                (click)="searchTraineeByGenId()"
            ></button>
            <!-- apply lop btn -->
            <button
                pButton
                *ngIf="showTraineeDetails"
                iconPos="right"
                label="Apply"
                icon="pi pi-check-circle"
                class="mt-10 xl:w-1/12"
                (click)="applyLopForTrainee()"
            ></button>
        </div>
      </div>
    </div>
  </div>
</div>
