<div class="mx-2">
   <!-- header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>supervisor_account</mat-icon> OT Approver Mapping<hr/>
    </h1>
    <p class="mt-1 text-gray-400">View and Manage OT Approver</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>

  <!-- filters -->
      <div class="!shadow-md !my-4 !rounded-md !mx-auto h-full pb-3 !px-4 !font-poppins sm:h-40 border border-gray-400 ">
        <!-- filter header -->
        <div class="relative">
            <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
              Filters <mat-icon>filter_alt</mat-icon>
            </h1>
          <!-- primeNG speedDial -->
            <p-speedDial 
              [model]="items" 
              direction="left"
              className="absolute right-0 top-0"
              buttonClassName="!h-[2.5rem] !w-[2.5rem]"
            >
            </p-speedDial>
        </div>
        <!-- filters -->
        <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
            <!-- plant based filter filter -->
            <div class="font-poppins sm:w-1/3 w-full">
                <label for="status" class="text-gray-400 font-poppins mt-3 mb-1 font-semibold">Plant</label> <br>
                <p-dropdown 
                [options]="plantArray"
                optionLabel="plant_name"
                [(ngModel)]="selectedPlant"
                optionValue="plant_code"
                styleClass="w-full py-1"
                [disabled]="plant !== '' "
                (onChange)="filterOtApproverByPlant()" 
                placeholder="Select Plant"></p-dropdown>
            </div>
          </div>
      </div>
  <!-- ot approver table -->
<div class="h-[90svh] lg:h-[75vh] xl:h-[75vh] sm:h-[60vh] shadow-md rounded-md border border-gray-400 overflow-y-scroll">
  <table id="table" class="table-auto !w-full">
     <!-- table head -->
      <thead class="sticky top-0">
        <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center xl:!text-left">
          <th class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center">SNo</th>
          <th class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Plant</th>
          <th class="!text-white !px-2 !py-2 !border-none !border-0">Executive Name</th>
          <th class="!text-white !px-2 !py-2 !border-none !border-0">Functional Head</th>
          <th class="!text-white !px-2 !py-2 !border-none !border-0">HR Head</th>
          <th class="!text-white !rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center">Action</th>
        </tr>
      </thead>
      <!-- table body -->
      <tbody>
        <tr *ngFor="let item of list;let i=index" class="!border-none !border-0 !hover:bg-blue-200 !font-poppins cursor-pointer">
            <td class="!px-2 !py-4 !rounded-s-md text-center">{{i+1}}</td>
            <td class="!px-2 !py-4 !rounded-s-md text-center text-blue-600 font-semibold">{{item.plant}}</td>
            <td class="!px-2 !py-4 !rounded-s-md">{{item.exec}}</td>
            <td class="!px-2 !py-4 !rounded-s-md">{{item.func_head}}</td>
            <td class="!px-2 !py-4 !rounded-s-md">{{item.hr}}</td>
            <!-- action btn -->
            <td class="!px-2 !py-4 !rounded-e-md flex items-center justify-center">
              <button  (click)="openEdit(item)">
                <mat-icon class="text-blue-600 text-[20px]">edit</mat-icon>
            </button>
            <button (click)="delete($event,item.id)" >
                <mat-icon class="text-red-600 text-[20px]">delete</mat-icon>
            </button>
            </td>
        </tr>
      </tbody>
    </table>
</div>
</div>
