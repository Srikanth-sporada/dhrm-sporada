<div class="mx-2">
  <!-- header -->
  <div class="!flex !items-center gap-2 py-2 !justify-between !shadow-md !my-4 mx-2 !rounded-md !px-4 !font-poppins border border-gray-400 h-auto flex-col md:flex-row md:!h-20">
    <div class="flex items-start justify-start flex-col">
      <h1 class="!text-[1.5rem] !font-semibold flex items-center justify-center gap-2 text-blue-600">
      <mat-icon>analytics</mat-icon> Department Muster Report<hr/>
    </h1>
    <p class="mt-1 text-gray-400">Download Department Muster Report</p>
    </div>
    <!-- user details -->
         <h1 class="!text-[1.25rem] !font-semibold flex items-center justify-center gap-2 text-blue-600 float-right">
          {{userDetails}}
         </h1>
  </div>

   <!-- tainee application filters -->
   <div>
    <!-- tainee application filters -->
  <div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Action <mat-icon>call_to_action</mat-icon>
        </h1>
      </div>
   <div>
     <!-- trainee application filter first row -->
     <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
      <!-- from date -->
     <div class="w-full">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">From Date</label> <br>
      <p-calendar 
         [(ngModel)]="from"
        dateFormat="yy-mm-dd"
        styleClass="w-full !font-poppins"
        [showIcon]="true" >
     </p-calendar>
     </div>
     <!-- to date -->
     <div class="w-full">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-3">To Date</label> <br>
      <p-calendar 
        [(ngModel)]="to"
        dateFormat="yy-mm-dd"
        styleClass="w-full !font-poppins"
        [showIcon]="true" >
     </p-calendar>
     </div>
      <!-- search btn -->
     <div class="w-full mt-8 ml-3">
      <p-button 
        icon="pi pi-download"
        styleClass="rounded-[1.5rem] mt-2"
        (onClick)="getData()"
        label="Download"  
      >
     </p-button> 
     </div>
     </div>
    </div>
  </div>
   </div>

  <mat-form-field appearance="outline">
    <mat-label>to</mat-label>
    <input matInput placeholder="label" type='date'[(ngModel)]="to">
  </mat-form-field>
  <button mat-raised-button color="primary" style="height: 40px; margin-top: 10px;" (click)="getData()">Download</button> -->
</div>
