<h1 class="title">Night Shift Comp-Off Approval by Supervisor</h1>
<div class="filter">
  <div class="col-sm-3">
    <b><p>Filter Line:</p></b>
    <mat-select class="" [(ngModel)]="selectedLine" class="input2">
      <mat-option value="">ALL</mat-option>
      <mat-option *ngFor="let line of lines" [value]="line.Line_Name">{{line.Line_Name}}</mat-option>
    </mat-select>
    <br>
  </div>
</div>
<hr style="border-block-color: orange" />
<div class="select_menu">
<div class="table-wrapper">
  <table class="table table-bordered table-striped table-hover">
    <table id="table">
      <thead>
        <tr>
          <th
            class="text-center"
            style="width: 500px"
            style="background-color: darkblue; color: aliceblue"
          >
            SL No
          </th>
          <th div class="text-center">Gen Id</th>
          <th div class="text-center">Name</th>
          <th div class="text-center">Department</th>
          <th div class="text-center">Line</th>
          <th div class="text-center">Category</th>
          <th div class="text-center">Worked On</th>
          <th div class="text-center">Apply</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="
            let item of data | lineFilter : selectedLine;
            let i = index
          "
        >
          <td>
            {{i+1}}
          <td>{{ item.gen_id }}</td>
          <td>{{ item.fullname }}</td>
          <td>{{ item.dept_name }}</td>
          <td>{{ item.Line_Name }}</td>
          <td>{{ item.apprentice_type }}</td>
          <td>{{ item.date |date:'dd-MM-yyy'}}</td>
          <td>
            <button mat-raised-button color="primary" (click)="openDailog(item)">Apply Coff</button>
          </td>
        </tr>
      </tbody>
    </table>
  </table>
</div>
