<!-- trainee head count summary filter -->
<div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
   <form [formGroup]="filterForm">
     <!--  filter first row -->
     <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
        <!-- from date -->
        <div class="w-full">
        <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">From Date</label> <br>
        <p-calendar
            formControlName="fromDate"
            dateFormat="yy-mm-dd"
            styleClass="w-full !font-poppins"
            [showIcon]="true" >
        </p-calendar>
        </div>
       <!-- to date -->
        <div class="w-full">
        <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">To Date</label> <br>
        <p-calendar 
            formControlName="toDate"
            dateFormat="yy-mm-dd"
            styleClass="w-full !font-poppins"
            [showIcon]="true" 
            [maxDate]="this.initialToDate">
        </p-calendar>
        </div>
        <!-- plant -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-2 mb-1 font-semibold">Plant</label> <br>
          <p-dropdown 
            [options]="plantOptions"
            formControlName="plant"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full" 
            placeholder="Select Plant"
            [disabled]="!isAdmin" >
            <ng-template let-plant pTemplate="item">
              <div class="flex align-items-center gap-2">
                <span>{{ plant.plant_code + '-' + plant.plant_name }}</span>
              </div>
          </ng-template>
          </p-dropdown>
       </div>
     </div>
     <!-- filters second row -->
      <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
       <!-- category -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-2 mb-1 font-semibold">Category</label> <br>
          <p-dropdown 
            [options]="plantOptions"
            formControlName="traineeCategory"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full" 
            placeholder="Select Category" ></p-dropdown>
       </div>
      <!-- work contract -->
     <div class="w-full p-fluid">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">Work Contract</label> <br>
      <p-dropdown 
       [options]="plantOptions"
        formControlName="workContract"
        optionLabel="plant_name"
        optionValue="plant_code"
        styleClass="w-full" 
        placeholder="Select Work Contract" ></p-dropdown>
      
     </div>
     <!-- search btn -->
     <div class="w-full mt-6 ml-3">
      <p-button 
        icon="pi pi-search"
        styleClass="rounded-[1.5rem] mt-2"
        label="Search"
        (onClick)="getTraineeHeadCountSummary()"
      >
     </p-button> 
     </div>
     </div>
   </form>
    </div>
</div>

<!-- Head Count Summary Prime NG table -->
  <p-table 
    [value]="traineeHeadCountSummaryData" 
    responsiveLayout="scroll" 
    [resizableColumns]="true"
    [paginator]="true"
    [rowsPerPageOptions]="[5,10,15]"
    [rows]="5"
    (onPage)="logPageEvent($event)"
    [tableStyle]="{'min-width': '50rem'}"
    [scrollable]="true"
    scrollHeight="53vh"
    styleClass="shadow-md rounded-md border border-gray-400  mx-2 p-datatable-striped">
    <!-- table head -->
    <ng-template pTemplate="header">
      <tr class="!sticky !top-0 !z-10 !border-none !border-0">
        <th class="!shadow !my-4 !bg-blue-600 !font-poppins xl:!text-left !text-white rounded-s-lg"
            pSortableColumn="group">
          Employee Group
           <p-sortIcon field="group"></p-sortIcon>
        </th>
        <th class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins xl:!text-left !text-white" pSortableColumn="female">
          Female
          <p-sortIcon field="female"></p-sortIcon>
        </th>
        <th class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins xl:!text-left !text-white" pSortableColumn="male">
          Male
          <p-sortIcon field="male" ></p-sortIcon>
        </th>
        <th class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins xl:!text-left !text-white rounded-e-lg" pSortableColumn="total">
          Total
           <p-sortIcon field="female" ></p-sortIcon>
        </th>
      </tr>
    </ng-template>
<!-- table body -->
    <ng-template pTemplate="body" let-row>
      <tr class="!font-poppins !border-none !border-0">
        <td>{{ row.group }}</td>
        <td>{{ row.female }}</td>
        <td>{{ row.male }}</td>
        <td class="font-bold">{{ row.female + row.male }}</td>
      </tr>
    </ng-template>
<!-- table footer -->
    <ng-template pTemplate="footer">
      <tr class="font-bold !font-poppins !border-none !border-0">
        <td>{{ totalRow.group }}</td>
        <td>{{ totalRow.female }}</td>
        <td>{{ totalRow.male }}</td>
        <td>{{ totalRow.female + totalRow.male }}</td>
      </tr>
    </ng-template>
  </p-table>
