<!-- trainee present trend report filters -->
<div class="!shadow-md !my-4 !rounded-md  h-full pb-3 !px-4 !font-poppins sm:h-min border border-gray-400 mx-2">
    <!-- filter header -->
      <div class="relative">
        <h1 class="!text-[1.3rem] !font-semibold gap-1 text-blue-600 flex items-center justify-start mt-2">
          Filters <mat-icon>filter_alt</mat-icon>
        </h1>
   <form [formGroup]="filterForm">
     <!--  filter first row -->
     <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
        <!-- from date -->
        <div class="w-full">
        <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">From Date</label> <br>
        <p-calendar
            formControlName="fromDate"
            dateFormat="yy-mm-dd"
            styleClass="w-full !font-poppins"
            [showIcon]="true" >
        </p-calendar>
        </div>
       <!-- to date -->
        <div class="w-full">
        <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">To Date</label> <br>
        <p-calendar 
            formControlName="toDate"
            dateFormat="yy-mm-dd"
            styleClass="w-full !font-poppins"
            [showIcon]="true" 
            [maxDate]="this.initialToDate">
        </p-calendar>
        </div>
        <!-- plant -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-2 mb-1 font-semibold">Plant</label> <br>
          <p-dropdown 
            [options]="plantOptions"
            formControlName="plant"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full" 
            placeholder="Select Plant" >
             placeholder="Select Plant" >
            <ng-template let-plant pTemplate="item">
              <div class="flex align-items-center gap-2">
                <span>{{ plant.plant_code + '-' + plant.plant_name }}</span>
              </div>
          </ng-template>
          </p-dropdown>
       </div>
     </div>
     <!-- filters second row -->
      <div class="flex items-center justify-between w-full flex-col sm:flex-row sm:gap-2">
       <!-- category -->
       <div class="font-poppins w-full">
          <label for="status" class="text-gray-400 font-poppins mt-2 mb-1 font-semibold">Category</label> <br>
          <p-dropdown 
            [options]="plantOptions"
            formControlName="traineeCategory"
            optionLabel="plant_name"
            optionValue="plant_code"
            styleClass="w-full" 
            placeholder="Select Category" ></p-dropdown>
       </div>
      <!-- work contract -->
     <div class="w-full p-fluid">
      <label for="date" class="font-semibold text-gray-400 mb-1 mt-2">Work Contract</label> <br>
      <p-dropdown 
       [options]="plantOptions"
        formControlName="workContract"
        optionLabel="plant_name"
        optionValue="plant_code"
        styleClass="w-full" 
        placeholder="Select Work Contract" ></p-dropdown>
      
     </div>
     <!-- search btn -->
     <div class="w-full mt-6 ml-3">
      <p-button 
        icon="pi pi-search"
        styleClass="rounded-[1.5rem] mt-2"
        label="Search"
        (onClick)="getTraineePresentTrendData()"
      >
     </p-button> 
     </div>
     </div>
   </form>
    </div>
</div>
   <!-- prime ng line chart -->
<div class="mx-2 shadow border border-gray-300 rounded-sm">
    <!-- <p-card styleClass="mx-2"> -->
     <p-chart type="line" [data]="lineChartData" [options]="lineChartOptions" height="400px"></p-chart>
    <!-- </p-card> -->
</div>
