<div class="body form-group mx-2 mt-4">
    <div style="text-align: right;" class="mb-3">
        <button *ngIf="istrainee === 'true'"   pButton class="rounded-3xl mr-3" label="Back" icon="pi pi-arrow-circle-left" (click)="navigateBack()"></button>

        <button *ngIf="supvis === 'true'"  pButton class="rounded-3xl mr-3" label="Back" icon="pi pi-arrow-circle-left" (click)="hrNavigate()"></button>

        <button *ngIf="ishr === 'true'"  pButton class="rounded-3xl mr-3" label="Back" icon="pi pi-arrow-circle-left" onclick="history.back()"></button>
    </div>  

    <!-- answer sheet table -->
    <div  class="shadow-md rounded-md border border-gray-400 overflow-y-scroll no-scrollbar mx-2">
      <form #quizForm="ngForm">
        <table class="w-full !table-auto">
            <thead id="table" class="table-auto !w-full">
                <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center xl:!text-left">
                    <td class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center">Sno</td>
                    <td class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Questions</td>
                    <td class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Image</td>
                    <td class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Correct Answer</td>
                    <td class="!text-white !rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center">Selected Answer</td>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let q of answers; let i = index" class="!border-none !border-0 !hover:bg-blue-200 !font-poppins cursor-pointer">
                    <td class="!px-2 !py-4 !rounded-s-md text-center">{{ i + 1 }}</td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">
                        <textarea style="resize: none; outline: none; border-color: white; width: 100%; height: 250px; background-color: white;" [disabled]="true"
                        pInputTextarea>{{ q.question }}</textarea>
                    </td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">
                        <a [href]="q.img_name" target="_blank">Answer</a>
                        <!-- <img *ngIf="q.img_name" [src]="q.img_name" alt="Question Image" style="width: 100%; height: 200px;"> -->
                    </td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">
                        {{ q.Correct_Answer }}
                    </td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">
                        {{ q.Test_Answer }}
                    </td>                    
                </tr>
            </tbody>
        </table>
    </form>
    </div>
   
</div>
