<div class="body form-group mx-2 mt-4">
    <div style="text-align: right;" class="mb-3">
        <button *ngIf="istrainee === 'true'" pButton class="rounded-3xl mr-3" label="Back" icon="pi pi-arrow-circle-left" (click)="navigateBack()"></button>

        <button *ngIf="ishr === 'true'"  pButton class="rounded-3xl mr-3" label="Back" icon="pi pi-arrow-circle-left" onclick="history.back()"></button>
    </div>

    <form #quizForm="ngForm" class="shadow-md rounded-md border border-gray-400 overflow-y-scroll no-scrollbar mx-2">
        <table class="w-full !table-auto">
            <!-- table head -->
            <thead id="table" class="table-auto !w-full">
                <tr class="!border-none !border-0 !shadow !my-4 !bg-blue-600 !font-poppins text-center xl:!text-left">
                    <td class="!text-white !rounded-s-lg !px-2 !py-2 !border-none !border-0 text-center">Sno</td>
                    <td class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Abservent Point</td>
                    <td class="!text-white !px-2 !py-2 !border-none !border-0 text-center">Rating</td>
                    <td class="!text-white !rounded-e-lg !px-2 !py-2 !border-none !border-0 text-center">Remarks</td>
                </tr>
            </thead>
            <!-- table body -->
            <tbody>
                <tr *ngFor="let q of answers; let i = index" class="!border-none !border-0 !hover:bg-blue-200 !font-poppins cursor-pointer">
                    <td class="!px-2 !py-4 !rounded-s-md text-center">{{ i + 1 }}</td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">
                        <textarea style="resize: none; outline: none; border-color: white; width: 100%; height: 100px; background-color: white;" [disabled]="true" pInputTextarea>{{ q.Abservent_Point }}</textarea>
                    </td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">{{ q.Rating }}</td>
                    <td class="!px-2 !py-4 !rounded-s-md text-center">{{ q.Remarks }}</td>
                </tr>
            </tbody>
        </table>
    </form>
</div>
