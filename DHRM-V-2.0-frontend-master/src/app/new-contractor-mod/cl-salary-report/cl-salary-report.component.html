<div>
  <div>
    <h2 class="heading">CL Salary Reports</h2>
    <div class="controls">
      <mat-form-field appearance="outline">
        <mat-label>Report Type</mat-label>
        <mat-select [(ngModel)]="selectedReportType">
          <mat-option *ngFor="let report of reportType" [value]="report.code">{{ report.name }}</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- OTMSAL (One Time Earnings & Deduction Salary Report) -->
      <mat-form-field appearance="outline" *ngIf="selectedReportType === 'OTMSAL'">
        <mat-label>Month</mat-label>
        <input
          matInput
          type="month"
          [(ngModel)]="from"
          (change)="datechnage()"
        />
      </mat-form-field>

      <!-- PRSAL (Previous Payroll Salary Report) -->
      <mat-form-field appearance="outline" *ngIf="selectedReportType === 'PRSAL'">
        <mat-label>Contractor</mat-label>
        <mat-select [(ngModel)]="selectedContractor">
          <mat-option *ngFor="let data of Con_list" [value]="data.Con_Id">{{data.Plant_code}}-{{data.Cont_company_name}}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" *ngIf="selectedReportType === 'PRSAL'">
        <mat-label>Month</mat-label>
        <input
          matInput
          type="month"
          [(ngModel)]="from"
          (change)="datechnage()"
        />
      </mat-form-field>

      <!-- CTSAL (Current Payroll Salary Report) -->
      <mat-form-field appearance="outline" *ngIf="selectedReportType === 'CTSAL'">
        <mat-label>Contractor</mat-label>
        <mat-select [(ngModel)]="selectedContractor">
          <mat-option *ngFor="let data of Con_list" [value]="data.Con_Id">{{data.Plant_code}}-{{data.Cont_company_name}}</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Plant selection for all reports -->
      <mat-form-field appearance="outline">
        <mat-label>Plant</mat-label>
        <mat-select
          [(ngModel)]="plant"
          [disabled]="isadmin === 'false'"
        >
          <mat-option value="" selected>All</mat-option>
          <mat-option
            *ngFor="let plant of plantlist"
            [value]="plant.plant_code"
          >{{ plant.plant_code }}</mat-option>
        </mat-select>
      </mat-form-field>

      <div>
        <button mat-raised-button color="primary" (click)="getData()" [disabled]="loading">Download</button>
      </div>
    </div>
  </div>
</div>
