<div class="body form-group">
    <div style="text-align: right; margin-top: 2%; margin-right: 10%;">
        <button *ngIf="istrainee === 'true'"   mat-raised-button color="primary" (click)="navigateBack()">Back</button>

        <button *ngIf="supvis === 'true'"  mat-raised-button color="primary" (click)="hrNavigate()">Back</button>

        <button *ngIf="ishr === 'true'"  mat-raised-button color="primary" onclick="history.back()">Back</button>
    </div>  

    <form #quizForm="ngForm">
        <table class="table" style="width: 95%; margin-top: 2%; margin-left: 2%; margin-right: 2%;">
            <thead style="background-color: #D3D3D3; color: black; font-size: 14px;">
                <tr>
                    <td style="width: 3%; border: 1px solid #000;">S.No</td>
                    <td style="width: 60%; border: 1px solid #000; text-align: center;">Questions</td>
                    <td style="width: 25%; border: 1px solid #000; text-align: center;">Image</td>
                    <td style="width: 5%; border: 1px solid #000;">Correct Answer</td>
                    <td style="width: 5%; border: 1px solid #000; text-align: center;">Selected Answer</td>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let q of answers; let i = index">
                    <td style="border: 1px solid #000;">{{ i + 1 }}</td>
                    <td style="border: 1px solid #000;">
                        <textarea style="resize: none; outline: none; border-color: white; width: 100%; height: 250px; background-color: white;" disabled="true">{{ q.question }}</textarea>
                    </td>
                    <td style="border: 1px solid #000;">
                        <img *ngIf="q.img_name" [src]="q.img_name" alt="Question Image" style="width: 100%; height: 200px;">
                    </td>
                    <td style="border: 1px solid #000;  text-align: center;">
                        {{ q.Correct_Answer }}
                    </td>
                    <td style="white-space: pre; border: 1px solid #000;  text-align: center;">
                        {{ q.Test_Answer }}
                    </td>                    
                </tr>
            </tbody>
        </table>
    </form>
</div>
