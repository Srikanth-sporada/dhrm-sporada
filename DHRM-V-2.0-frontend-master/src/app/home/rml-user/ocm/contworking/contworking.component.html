<div>
  <mat-form-field appearance="outline">
    <mat-label>Month</mat-label>
    <input matInput placeholder="label" type="month" value="value" [(ngModel)]="date" (ngModelChange)="getData()">
  </mat-form-field>
  <canvas
   class="chart"
    baseChart
    class="chart"
    [data]="barChartData"
    [options]="barChartOptions"
    [plugins]="barChartPlugins"
    [type]="barChartType"
  >
  </canvas>
</div>
