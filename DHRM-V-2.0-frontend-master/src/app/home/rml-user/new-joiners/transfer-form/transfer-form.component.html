<div class="container pt-2">
    <div class="row justify-content-md-center pt-5">
        <div class="table col-sm-20 shadow round pb-4">
            <div class="mx-5">
                <br>
                <div class="title"> Department Transfer Details</div>
                <form [formGroup]="form">

                    <div class="row">
                        <div class="col">
                            <label>Application No: </label><br>
                            <input class="form-control" formControlName="apln_slno" readonly>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label>Employee ID: </label><br>
                            <input class="form-control" formControlName="idno" readonly>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label>Employee Name: </label><br>
                            <input class="form-control" formControlName="fullname" readonly>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label>Current Department: </label><br>
                            <input class="form-control" type="text" formControlName="current_department" readonly>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label>Current Line: </label><br>
                            <input class="form-control" type="text" formControlName="current_line" readonly>
                        </div>
                    </div><br>
                    <div class="row">
                        <div class="col">
                            <label>Role/Activity: </label><br>
                            <input class="form-control" type="text" formControlName="current_Role" readonly>
                        </div>
                    </div><br>
                    <div class="row">
                        <div class="col">
                            <label>Reporting Officer: </label><br>
                            <input class="form-control" type="text" formControlName="emp_name" readonly>
                        </div>
                    </div><br>
                    <div class="row">
                        <div class="col">
                            <label>Current Work Category: </label><br>
                            <input class="form-control" type="text" formControlName="workcat" readonly>
                        </div>
                    </div><br>
                    <div class="row">
                        <div class="col">
                            <label>Change Department To: </label><br>
                            <select (change)="getline_Role($event)" class="form-control"
                                formControlName="changedepartment">
                                <option value="">select</option>
                                <option *ngFor="let i of changedepartment" [ngValue]="i.dept_slno">{{i.dept_name}}
                                </option>
                            </select>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label>Change Line To: </label><br>
                            <select class="form-control" formControlName="changeline">
                                <option value="">select</option>
                                <option *ngFor="let i of changeline" [ngValue]="i.line_code">{{i.line_name}}</option>
                            </select>
                        </div>
                    </div><br>
                    <div class="row">
                        <div class="col">
                          <label>Change Role/Activity To: </label><br>
                          <select 
                            class="form-control" 
                            (change)="onRoleChange($event)" 
                            formControlName="change_Role">
                            <option value="">select</option>
                            <option *ngFor="let row of changeRole" [value]="row.Role_Id">
                              {{ row.Role_Name }}
                            </option>
                          </select>
                        </div>
                      </div><br>
                      
                      <div class="row">
                        <div class="col">
                          <label>Work Description:</label><br>
                          <input 
                            class="form-control" 
                            type="text" 
                            [readonly]="true" 
                            formControlName="changeworkcat">
                        </div>
                      </div>
                      
                    <div class="row">
                        <div class="col">
                            <label>Reporting To:</label><br>
                            <select class="form-control" formControlName="reportingto">
                                <option value="">select</option>
                                <option *ngFor="let i of reportingto" [ngValue]="i.empl_slno">{{i.emp_name}}</option>
                            </select>
                        </div>
                    </div>
                    <br>
            


                    <br>
                    <button type="submit" mat-raised-button  color="primary" style="width:150px" [disabled]="form.invalid" (click)="submit()">Transfer</button>

                </form>
            </div>
        </div>
    </div>
</div>
