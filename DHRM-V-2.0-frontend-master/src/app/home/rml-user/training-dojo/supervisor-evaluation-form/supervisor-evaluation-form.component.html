<div class="body form-group">

    <div style="display: flex; flex-wrap: wrap; gap: 30px; margin: 20px 2%;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Employee Name:</label>
            <span style="color: blue;">{{ emp_det?.fullname }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Department Name:</label>
            <span style="color: blue;">{{ emp_det?.dept_name }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Line Name:</label>
            <span style="color: blue;">{{ emp_det?.Line_Name }}</span>
        </div>

    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 30px; margin: 20px 2%;">

         <div style="display: flex; align-items: center; gap: 8px;">
            <label>Operation Name:</label>
            <span style="color: blue;">{{ emp_det?.oprn_desc }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Current Skill Level:</label>
            <span style="margin-bottom: 1%; color: blue;">{{ emp_det?.Level_No }}</span>
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Proposed Skill Level:</label>
            <span style="margin-bottom: 1%; color: blue;">{{ emp_det?.Level_No + 1 }}</span>
        </div>
    </div>

    <div
        style="display: flex; justify-content: space-between; align-items: center; margin-top: 2%; margin-right: 10%; margin-left: 2%;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <label style="font-weight: 500; white-space: nowrap;">Recommended For Skill Upgrade:</label>
            <select style="font-size: 14px; width: 75px; height: 34px; border-radius: 0px; border-color: black;" [(ngModel)]="recom" name="recommendation">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div style="display: flex; align-items: center; gap: 10px;">
            <button mat-raised-button color="primary" (click)="submit()">Submit</button>
            <button mat-raised-button color="warn" style="margin-left: 2%;" onclick="history.back()">Back</button>
        </div>
    </div>

    <div class="body form-group">
        <form>
            <table class="table" style="width: 95%; margin-top: 2%; margin-left: 2%; margin-right: 2%;">
                <thead style="background-color: #D3D3D3;">
                    <tr>
                        <th style="width: 3%; border: 1px solid #000; text-align: center;">Sl.No</th>
                        <th style="width: 40%; border: 1px solid #000; text-align: center;">Abservent Point</th>
                        <th style="width: 10%; border: 1px solid #000; padding: 0;">
                            <div style="border-bottom: 1px solid #000; text-align: center; padding: 4px;">Rating</div>
                            <div style="display: flex; height: 80%;">
                                <div
                                    style="width: 50%; border-right: 1px solid #000; text-align: center; font-weight: bold; padding: 4px;">
                                    Good
                                </div>
                                <div style="width: 50%; text-align: center; font-weight: bold; padding: 4px;">
                                    Average
                                </div>
                            </div>
                        </th>
                        <th style="width: 20%; border: 1px solid #000; text-align: center;">Remarks</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let q of Abser_Point; let i = index" style="height: 40px;">
                        <td style="border: 1px solid #000;">{{ i + 1 }}</td>
                        <td style="border: 1px solid #000;">
                            <textarea
                                style="resize: none; outline: none; border-color: white; width: 100%; height: 100px; background-color: white;"
                                disabled="true">{{ q.Abservent_Point }}</textarea>
                        </td>
                        <td style="border: 1px solid #000; padding: 4px; text-align: center; vertical-align: middle;">
                            <div
                                style="display: flex; justify-content: center; align-items: center; height: 100%; gap: 30px;">
                                <label style="display: flex; align-items: center; gap: 5px;">
                                    <input type="radio" name="rating_{{ i }}" value="Good" [(ngModel)]="ratings[i]" [checked]="ratings[i] === 'Good'"> Good
                                </label>
                                <label style="display: flex; align-items: center; gap: 5px;">
                                    <input type="radio" name="rating_{{ i }}" value="Average" [(ngModel)]="ratings[i]" [checked]="ratings[i] === 'Average'"> Average
                                </label>
                            </div>
                        </td>
                        <td style="border: 1px solid #000;">
                            <textarea
                                style="resize: none; outline: none; border-color: white; width: 100%; height: 80px; background-color: white;"
                                [(ngModel)]="remarks[i]"
                                name="remark{{ i }}"
                                (change)="RemarkChange($event, i)"
                                ></textarea>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>    

</div>
