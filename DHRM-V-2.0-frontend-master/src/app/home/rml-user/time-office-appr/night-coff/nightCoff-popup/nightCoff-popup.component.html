<div class="container">
  <div class="details">
    <div><b>Name:</b>{{ data.fullname }}</div>
    <div><b>Gen Id:</b>{{ data.gen_id }}</div>
    <div><b>Category:</b>{{ data.apprentice_type }}</div>
    <div><b>Department:</b>{{ data.dept_name }}</div>
    <div><b>Line:</b>{{ data.Line_Name }}</div>
  </div>
  <div class="select_menu">
    <div><b>Worked Date:</b>{{ data.date |date:'dd-MM-yyyy'}}</div>
    <!-- <mat-checkbox
      [(ngModel)]="selectAll"
      style="margin-left: 20px"
      color="primary"
      (ngModelChange)="handelSelectAll()"
      >Select All</mat-checkbox
    >
    <div style="margin: 0 20px 10px 0">
      <button mat-raised-button style="margin: 5px" color="success" (click)="approve()">
        Approve
      </button>
    </div>-->
  </div> 
  <div class="table-wrapper">
    <table class="table table-bordered table-striped table-hover">
      <table id="table">
        <thead>
          <tr>
            <th
              class="text-center"
              style="width: 100px"
              style="background-color: darkblue; color: aliceblue"
            >
              SL No
            </th>
            <th div class="text-center">Absent Date</th>
            <th div class="text-center">Apply</th>
        </thead>
        <tbody>
          <tr *ngFor="let item of absentData; let i = index">
            <td>
             {{i+1}}
            </td>
            <td>{{ item.absent_days }}</td>
            <td>
              <button mat-raised-button color="primary" (click)="approve(item.absent_days)" [disabled]="loading">Apply</button>
            </td>
          </tr>
        </tbody>
      </table>
    </table>
  </div>
</div>
