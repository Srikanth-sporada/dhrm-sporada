<div class="container">
    <br/>
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 0.5rem;margin-bottom: 1rem;">
      <h1 id="title1" style="margin: 0 auto;">Route Master</h1>
      <button color="primary"  (click) ='add_On()' style="margin-right: 2rem;" mat-fab >
        <mat-icon>add</mat-icon>
      </button>
      <button mat-fab (click)="exportExcel()" >
        <mat-icon>download</mat-icon>
      </button> 
     
    </div>
    
    <hr style="border-block-color: orange" />


    <br/>
    <table class="table table-bordered table-striped table-hover">
        <table id="table">
            <thead>
                <tr>
                    <th  class="text-center"
                    style="background-color: darkblue">Sl_No</th>
                    <th  class="text-center">Plant</th>
                    <th  class="text-center">Route name</th>
                    <th  class="text-center">Status</th>
                    <th  class="text-center">Action</th>
                </tr>
            </thead>
            <tbody >
                <tr *ngFor="let data of routelist ; let i = index">
                    <td>{{ i + 1 }}</td>
                    <td>{{data.Plant}}</td>
                    <td>{{data.Route_Name}}</td>
                    <td *ngIf="data.Status == 'Active'; else inactive">Active</td>
          <ng-template #inactive>
            <td>InActive</td>
          </ng-template>
                  
          <td style="display: flex; justify-content: center">
            <button
            *ngIf="data.Status == 'Active' "
              mat-mini-fab
              color="accent"
              style="margin-left: 1rem"
              (click) ='view_On(data)'
            >
              <!-- <button mat-mini-fab  color="basic" [routerLink]="['/rml/contra/mst_payscale', 'master',data.Effective_Date]" class="view-button" > -->

              <mat-icon>edit</mat-icon>
            </button>
     
            <button
            *ngIf="data.Status == 'Active' "
            style="margin-left: 1rem;"
              mat-mini-fab
              color="warn"
              type="button"
           (click)="delete(data)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
                 
                   </tr>
            </tbody> 
              
        </table>

        </table>

    </div>


    <div class="shadow-lg">
        <div
          class="form-popup container1 mat-elevation-z8"
          [hidden]="!addForm"
        >
          <!-- <div class=" form-popup container1 mat-elevation-z8"  > -->
      
          <div class="heading" style="padding-bottom: 2px">
            <div class="head1">
              <h2>Add Route</h2>
            </div>
            <div class="head2">
              <!-- <button (click)="closeAllForms()">X</button> -->
            </div>
          </div>
      
          <hr style="border-block-color: orange" />
            <span style=" display:flex; margin-top: 2rem;">
     
                <mat-form-field appearance="outline" style="width: 100%;margin-left: 0rem;">
                    <mat-label>Route Name</mat-label>
                    <input type="text" matInput [(ngModel)]="route" />
                </mat-form-field>
        
        </span>

            <span style=" display:flex; margin-top: 1rem;">
            <button mat-raised-button color="warn" (click) ='close()' type="close"style="width: 50%;">Close</button>
            <button mat-raised-button color="primary"  [disabled]="!route" (click)="submt_Route()"  style="width: 50%;margin-left: 1rem;">Add</button>
          </span>
     
        </div>
      </div>
    <div class="shadow-lg">
        <div
          class="form-popup container1 mat-elevation-z8"
          [hidden]="!viewForm"
        >
          <!-- <div class=" form-popup container1 mat-elevation-z8"  > -->
      
          <div class="heading" style="padding-bottom: 2px">
            <div class="head1">
              <h2>Edit Route</h2>
            </div>
            <div class="head2">
              <!-- <button (click)="closeAllForms()">X</button> -->
            </div>
          </div>
      
          <hr style="border-block-color: orange" />
            <span style=" display:flex; margin-top: 2rem;">
     
                <mat-form-field appearance="outline" style="width: 100%;margin-left: 0rem;">
                    <mat-label>Route Name</mat-label>
                    <input type="text" matInput [(ngModel)]="route" />
                </mat-form-field>
        
        </span>

            <span style=" display:flex; margin-top: 1rem;">
            <button mat-raised-button color="warn"  (click) ='close()' type="close"style="width: 50%;">Close</button>
            <button mat-raised-button color="primary" [disabled]="!route"  (click)="Edit_route()"  style="width: 50%;margin-left: 1rem;">Update</button>
          </span>
     
        </div>
      </div>
